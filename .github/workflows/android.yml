name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android_app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'android_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            ffmpeg \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            libgstreamer-plugins-base1.0-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            unzip \
            zip \
            libffi-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Build debug APK
        run: |
          cd android_app
          yes | buildozer android debug || true
          buildozer android debug
        env:
          BUILDZER_SPEC: android_app/buildozer.spec

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android_app/bin/*.apk

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android_app/.buildozer/**/*.log
